<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TP JavaScript 1.0 - Haribo</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" rel="stylesheet" href="css/materialize.min.css" media="screen,projection"/>
  <link href="./css/css.css" rel="stylesheet" type="text/css" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
</head>
<body>
<div class="container"></div>
<div class="row" style="margin-top: 5px;">
  <!--          bloc bleu foncé -->
  <div class="col s12 m8">

    <div class="card blue-grey darken-1">
      <div class="card-content white-text">
        <div class="row" style="margin-bottom: 0;">

          <!--          colonne titre + image -->
          <div class="col s6">
            <span class="card-title">Chamallows</span>
            <div style="background: white; padding: 10px;">
              <img src="images/chamallows.jpg" alt="Chamallows" class="responsive-img">
            </div>
          </div>

          <!--          colonne details -->
          <div class="col s6">
            <span class="card-title">Détail</span>
            <div class="blue" style="padding: 10px; text-align: center; margin-bottom: 10px;">
              <p>Prix à l'unité 2.28 €</p>
              <p>Poids 100g</p>
            </div>
            <div class="blue" style="padding: 10px; display: flex; justify-content: space-around; align-items: center;">
              <i class="material-icons btn-moins" style="cursor: pointer;" data-type="chamallows">remove_circle_outline</i>
              <input type="text" id="qty-chamallows" value="0" style="width: 40px; background: white; text-align: center; height: 25px; border: none;" readonly>
              <i class="material-icons btn-plus" style="cursor: pointer;" data-type="chamallows">add_circle_outline</i>
            </div>
            <div id="info-chamallows" class="blue lighten-1" style="padding: 10px; text-align: center; margin-top: 10px; display: none;">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card blue-grey darken-1">
      <div class="card-content white-text">
        <div class="row" style="margin-bottom: 0;">

          <!--          colonne titre + image -->
          <div class="col s6">
            <span class="card-title">Dragibus</span>
            <div style="background: white; padding: 10px;">
              <img src="images/dragibus.jpg" alt="Dragibus" class="responsive-img">
            </div>
          </div>

          <!--          colonne détails -->
          <div class="col s6">
            <span class="card-title">Détail</span>
            <div class="blue" style="padding: 10px; text-align: center; margin-bottom: 10px;">
              <p>Prix à l'unité 1.64 €</p>
              <p>Poids 300g</p>
            </div>
            <div class="blue" style="padding: 10px; display: flex; justify-content: space-around ; align-items: center;">
              <i class="material-icons btn-moins" style="cursor: pointer;" data-type="dragibus">remove_circle_outline</i>
              <input type="text" id="qty-dragibus" value="0" style="width: 40px; background: white; text-align: center; height: 25px; border: none;" readonly>
              <i class="material-icons btn-plus" style="cursor: pointer;" data-type="dragibus">add_circle_outline</i>
            </div>
            <div id="info-dragibus" class="blue lighten-1" style="padding: 10px; text-align: center; margin-top: 10px; display: none;">
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
  <!--          bloc commande -->
  <div class="col s12 m4">
    <div class="card blue-grey darken-1">
      <div class="card-content white-text">
        <span class="card-title">Commande</span>
        <div id="detail-commande" style="min-height: 50px;">
<!--          la ou va y avoir resume commande-->
        </div>
      </div>
    </div>
  </div>

</div>
</div>
<script src="js/index.js"></script>

</body>
</html>
